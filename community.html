<style>
:root {
  --bg: #f8f9fa; --card: #fff; --border: #e9ecef; --text: #2d3436;
  --text-dim: #636e72; --green: #00b894; --red: #e17055; --accent: #fdcb6e;
  --ig: #E1306C; --yt: #FF0000; --x: #1DA1F2;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding: 20px; max-width: 900px; margin: 0 auto; }
h1 { font-size: 1.4rem; margin-bottom: 4px; }
.subtitle { color: var(--text-dim); font-size: 0.85rem; margin-bottom: 20px; }
.filters { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
.filter-btn { padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border); background: var(--card); cursor: pointer; font-size: 0.82rem; transition: all 0.2s; }
.filter-btn:hover { border-color: var(--text-dim); }
.filter-btn.active { background: var(--text); color: white; border-color: var(--text); }
.date-group { margin-bottom: 24px; }
.date-header { font-size: 0.9rem; font-weight: 600; padding: 8px 0; border-bottom: 2px solid var(--border); margin-bottom: 12px; }
.interaction { background: var(--card); border-radius: 8px; padding: 12px 16px; margin-bottom: 8px; border-left: 3px solid var(--border); }
.interaction.instagram { border-left-color: var(--ig); }
.interaction.youtube { border-left-color: var(--yt); }
.interaction.x { border-left-color: var(--x); }
.ix-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.ix-platform { font-size: 0.72rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
.ix-platform.instagram { color: var(--ig); }
.ix-platform.youtube { color: var(--yt); }
.ix-platform.x { color: var(--x); }
.ix-post { font-size: 0.75rem; color: var(--text-dim); }
.ix-author { font-weight: 600; font-size: 0.85rem; }
.ix-comment { color: var(--text-dim); font-size: 0.85rem; margin: 4px 0; padding-left: 12px; border-left: 2px solid var(--border); }
.ix-response { font-size: 0.85rem; margin-top: 4px; padding-left: 12px; border-left: 2px solid var(--green); }
.ix-response::before { content: 'Dylan: '; font-weight: 600; color: var(--green); }
.ix-type { font-size: 0.7rem; background: #eee; padding: 2px 8px; border-radius: 10px; }
.log-entry { background: var(--card); border-radius: 8px; padding: 10px 14px; margin-bottom: 6px; font-size: 0.82rem; border-left: 3px solid var(--border); }
.section-title { font-size: 1rem; font-weight: 600; margin: 24px 0 12px; padding-top: 16px; border-top: 1px solid var(--border); }
.empty { color: var(--text-dim); font-style: italic; padding: 20px; text-align: center; }
.stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; margin-bottom: 24px; }
.stat { background: var(--card); border-radius: 8px; padding: 12px; text-align: center; }
.stat-num { font-size: 1.4rem; font-weight: 700; }
.stat-label { font-size: 0.72rem; color: var(--text-dim); text-transform: uppercase; }
.back-link { display: inline-block; margin-bottom: 16px; color: var(--text-dim); text-decoration: none; font-size: 0.85rem; }
.back-link:hover { color: var(--text); }
</style>
</head>

let activeFilter = 'all';

function render() {
  const platforms = [...new Set(IX.map(i => i.platform))];
  const statsEl = document.getElementById('stats');
  const total = IX.length;
  const today = IX.filter(i => i.date === new Date().toISOString().slice(0,10)).length;

  const filtersEl = document.getElementById('filters');
  let fHTML = '<button class="filter-btn '+(activeFilter==='all'?'active':'')+'" onclick="setFilter('all')">Todas</button>';
  platforms.forEach(p => {
    fHTML += '<button class="filter-btn '+(activeFilter===p?'active':'')+'" onclick="setFilter(''+p+'')">'+(icons[p]||p)+'</button>';
  });
  filtersEl.innerHTML = fHTML;

  const contentEl = document.getElementById('content');
  let filtered = activeFilter === 'all' ? IX : IX.filter(i => i.platform === activeFilter);

  if (filtered.length > 0) {
    const byDate = {};
    filtered.forEach(i => {
      if (!byDate[i.date]) byDate[i.date] = [];
      byDate[i.date].push(i);
    });
    let cHTML = '';
    Object.keys(byDate).sort().reverse().forEach(date => {
      cHTML += '<div class="date-group"><div class="date-header">'+date+'</div>';
      byDate[date].forEach(i => {
        cHTML += '<div class="interaction '+i.platform+'">'

          +'<span class="ix-post">'+(i.post_title||'')+'</span>'
          +'<span class="ix-type">'+i.action_type+'</span>'
          +'</div>'
          +'<div class="ix-author">'+i.author+'</div>'
          +'<div class="ix-comment">'+i.author_comment+'</div>'
          +'<div class="ix-response">'+i.dylan_response+'</div>'
          +'</div>';
      });
      cHTML += '</div>';
    });
    contentEl.innerHTML = cHTML;
  } else {
    let logFiltered = activeFilter === 'all' ? LOGS : LOGS.filter(l => l.platform === activeFilter);

      let cHTML = '<div class="section-title">Log resumido (sin detalle individual aun)</div>';
      const byDate = {};
      logFiltered.forEach(l => {
        if (!byDate[l.date]) byDate[l.date] = [];

      });
      Object.keys(byDate).sort().reverse().forEach(date => {
        cHTML += '<div class="date-group"><div class="date-header">'+date+'</div>';

          cHTML += '<div class="log-entry"><strong>'+(icons[l.platform]||l.platform)+'</strong> ['+l.action_type+'] '+l.description+'</div>';

        cHTML += '</div>';
      });
      contentEl.innerHTML = cHTML;
    } else {
      contentEl.innerHTML = '<div class="empty">Sin interacciones registradas para este filtro</div>';
    }
  }
}

function setFilter(f) {
  activeFilter = f;

}
