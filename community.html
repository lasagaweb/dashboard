const icons = {instagram:'IG', youtube:'YT', x:'X', tiktok:'TT'};
let activeFilter = 'all';

function render() {
  const platforms = [...new Set(IX.map(i => i.platform))];
  const statsEl = document.getElementById('stats');
  const total = IX.length;
  const today = IX.filter(i => i.date === new Date().toISOString().slice(0,10)).length;
  let statsHTML = '<div class="stat"><div class="stat-num">'+total+'</div><div class="stat-label">Total 14d</div></div>';
  statsHTML += '<div class="stat"><div class="stat-num">'+today+'</div><div class="stat-label">Hoy</div></div>';
  platforms.forEach(p => {
    const n = IX.filter(i => i.platform === p).length;
    statsHTML += '<div class="stat"><div class="stat-num">'+n+'</div><div class="stat-label">'+(icons[p]||p)+'</div></div>';
  });
  statsEl.innerHTML = statsHTML;

  const filtersEl = document.getElementById('filters');
  let fHTML = '<button class="filter-btn '+(activeFilter==='all'?'active':'')+'" onclick="setFilter('all')">Todas</button>';
  platforms.forEach(p => {
    fHTML += '<button class="filter-btn '+(activeFilter===p?'active':'')+'" onclick="setFilter(''+p+'')">'+(icons[p]||p)+'</button>';
  });
  filtersEl.innerHTML = fHTML;

  const contentEl = document.getElementById('content');
  let filtered = activeFilter === 'all' ? IX : IX.filter(i => i.platform === activeFilter);

  if (filtered.length > 0) {
    const byDate = {};
    filtered.forEach(i => {
      if (!byDate[i.date]) byDate[i.date] = [];
      byDate[i.date].push(i);
    });
    let cHTML = '';
    Object.keys(byDate).sort().reverse().forEach(date => {
      cHTML += '<div class="date-group"><div class="date-header">'+date+'</div>';
      byDate[date].forEach(i => {
        cHTML += '<div class="interaction '+i.platform+'">'
          +'<div class="ix-header">'
          +'<span class="ix-platform '+i.platform+'">'+(icons[i.platform]||i.platform)+'</span>'
          +'<span class="ix-post">'+(i.post_title||'')+'</span>'
          +'<span class="ix-type">'+i.action_type+'</span>'
          +'</div>'
          +'<div class="ix-author">'+i.author+'</div>'
          +'<div class="ix-comment">'+i.author_comment+'</div>'
          +'<div class="ix-response">'+i.dylan_response+'</div>'
          +'</div>';
      });
      cHTML += '</div>';
    });
    contentEl.innerHTML = cHTML;
  } else {
    let logFiltered = activeFilter === 'all' ? LOGS : LOGS.filter(l => l.platform === activeFilter);
    if (logFiltered.length > 0) {
      let cHTML = '<div class="section-title">Log resumido (sin detalle individual aun)</div>';
      const byDate = {};
      logFiltered.forEach(l => {
        if (!byDate[l.date]) byDate[l.date] = [];
        byDate[l.date].push(l);
      });
      Object.keys(byDate).sort().reverse().forEach(date => {
        cHTML += '<div class="date-group"><div class="date-header">'+date+'</div>';
        byDate[date].forEach(l => {
          cHTML += '<div class="log-entry"><strong>'+(icons[l.platform]||l.platform)+'</strong> ['+l.action_type+'] '+l.description+'</div>';
        });
        cHTML += '</div>';
      });
      contentEl.innerHTML = cHTML;
    } else {
      contentEl.innerHTML = '<div class="empty">Sin interacciones registradas para este filtro</div>';
    }
  }
}

function setFilter(f) {
  activeFilter = f;
  render();
}

render();
